# --- Input / Output -----------------------------------------------------------
# Path to a plain text file with one NCBI accession per line (GCA_* or GCF_*)
accessions_file: "accessions.txt"

# Top-level run directory. results/, logs/ and benchmarks/ are created inside.
# Ignored when byspecies_root is set (v2 layout).
rundir: "annotseba_run"

# --- Phytolaeno v2 integration ------------------------------------------------
# When set, outputs land inside a pre-existing Phytolaeno BySpecies/ tree
# (created by generate_species_dir.py) instead of the flat annotseba_run/ dir.
# Leave empty to use the default v1 layout.
byspecies_root: ""

# Set to false to skip GAQET annotation quality evaluation.
# Useful when no annotation (GFF3) is expected for a given accession.
run_gaqet: true

# Override individual subdirectories if needed (defaults shown below).
# outdir:   "annotseba_run/results"
# logdir:   "annotseba_run/logs"
# benchdir: "annotseba_run/benchmarks"

# --- FASTA renaming -----------------------------------------------------------
# Prefix added to every renamed sequence ID (e.g. "Sp" -> Sp_C001, Sp_SCF001)
rename_prefix: "Sp"
# Path to the NCBI_FastaRename script. Use an absolute path or ensure it is on $PATH.
ncbi_fasta_rename_script: "NCBI_FastaRename"

# --- BUSCO settings -----------------------------------------------------------
# One or more BUSCO lineages to run against each genome.
# Common eukaryotic lineages:
#   Plants  : embryophyta_odb10, viridiplantae_odb10
#   Animals : metazoa_odb10, vertebrata_odb10, mammalia_odb10, insecta_odb10
#   Fungi   : fungi_odb10, ascomycota_odb10, basidiomycota_odb10
# Full list: https://busco.ezlab.org/list_of_lineages.html
busco_lineages:
  - embryophyta_odb10
  - viridiplantae_odb10

# Local directory where BUSCO will cache downloaded lineage databases.
# Will be created automatically on first run.
busco_downloads_path: "busco_downloads"

# --- QUAST settings -----------------------------------------------------------
# Contigs shorter than this length (bp) are excluded from statistics
quast_min_contig: 500

# --- GAQET2 annotation quality ------------------------------------------------
# Analyses to run. Available: AGAT, BUSCO, PSAURON, DETENGA, OMARK, PROTHOMOLOGY
gaqet_analyses:
  - AGAT
  - BUSCO

# Required only if OMARK is listed in gaqet_analyses
omark_db: ""

# Required only if DETENGA is listed in gaqet_analyses
detenga_db: ""

# Required only if PROTHOMOLOGY is listed in gaqet_analyses
# Provide one or more protein databases as TAG: path pairs
prothomology_dbs: {}
#   UniProt: "/path/to/uniprot.fasta"
#   SwissProt: "/path/to/swissprot.fasta"

# Output format for GAQET_PLOT image (png, jpeg, svg, pdf)
gaqet_plot_format: "png"

# Carbon footprint estimation (used by compute_usage rule)
# Carbon intensity in gCO2/kWh. Default: IEA 2022 world average.
# Find your local value at https://app.electricitymaps.com
carbon_intensity: 475
# Estimated CPU TDP per core in watts (adjust for your hardware)
cpu_tdp_per_core: 10

# --- Source file retention ----------------------------------------------------
# Set to true to keep the raw NCBI files ({acc}.fna and {acc}.gff3) after
# renaming. By default they are deleted to save disk space.
keep_source: false

# --- Resources ----------------------------------------------------------------
threads: 8
